name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Assemble Pages layout
        run: |
          mkdir -p pages/app
          # React SPA goes into /app/ subdirectory
          cp -r dist/* pages/app/
          # SPA 404 fallback for client-side routing
          cp dist/index.html pages/app/404.html
          # Landing page served at repo root
          cp landing.html pages/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - uses: actions/deploy-pages@v4
        id: deployment
